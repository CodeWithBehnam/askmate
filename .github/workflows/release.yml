name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version triad
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(bun -e "console.log(require('./manifest.json').version)")"
          PACKAGE_VERSION="$(bun -e "console.log(require('./package.json').version)")"
          HAS_VERSIONS_ENTRY="$(bun -e "const v=require('./versions.json'); console.log(Object.prototype.hasOwnProperty.call(v, process.argv[1]) ? 'yes' : 'no')" "$VERSION")"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag $VERSION does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi
          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag $VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi
          if [ "$HAS_VERSIONS_ENTRY" != "yes" ]; then
            echo "versions.json is missing an entry for $VERSION" >&2
            exit 1
          fi

      - name: Run tests
        run: bun run test

      - name: Build plugin
        run: bun run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AskMate ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
